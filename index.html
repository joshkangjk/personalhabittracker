<!doctype html>
<html lang="en">
  <head>    
    <style>
      body {
        background-color: hsl(var(--background));
        background-image: 
          radial-gradient(at 0% 0%, hsl(var(--primary) / 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, hsl(var(--accent) / 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, hsl(var(--primary) / 0.1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsl(var(--accent) / 0.1) 0px, transparent 50%);
        background-attachment: fixed;
        min-height: 100vh;
      }
    </style>

    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/svg+xml" href="/blackicon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/whiteicon.svg" media="(prefers-color-scheme: dark)" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Habits" />
    
    <link rel="apple-touch-icon" href=" /whiteappleicon.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/blackappleicon.png" media="(prefers-color-scheme: dark)" />
    
    <title>Habit Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
